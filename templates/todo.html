<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>To-Do List</title>
</head>
<body>
    <h1>Add a To-Do Item</h1>
    <form id="todoForm">
        <label for="itemName">Item Name:</label><br>
        <input type="text" id="itemName" name="itemName" required><br><br>

        <label for="itemDescription">Item Description:</label><br>
        <textarea id="itemDescription" name="itemDescription" required></textarea><br><br>

        <button type="submit">Add Item</button>
    </form>

    <script>
        document.getElementById('todoForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const itemName = document.getElementById('itemName').value;
            const itemDescription = document.getElementById('itemDescription').value;

            fetch('/submittodoitem', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ itemName, itemDescription })
            })
            .then(res => res.json())
            .then(data => alert('Item added: ' + JSON.stringify(data)))
            .catch(err => console.error(err));
        });
    </script>
</body>
</html>
